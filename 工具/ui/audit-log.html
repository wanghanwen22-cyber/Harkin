<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Precision Architect - 审核日志</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge">账</div>
          <div class="brand-copy">
            <h1>企业对账系统</h1>
            <p>审核记录</p>
          </div>
        </div>
        <nav class="nav-group">
          <a class="nav-link" href="./dashboard.html">仪表盘</a>
          <a class="nav-link active" href="./audit-log.html">审核日志</a>
          <a class="nav-link" href="./monthly-report.html">月度汇总</a>
          <a class="nav-link" href="./settings.html">系统设置</a>
        </nav>
      </aside>

      <main class="main">
        <section class="topbar">
          <div class="page-header">
            <p class="page-eyebrow">历史记录</p>
            <h2>审核日志</h2>
            <p>查看历史任务的时间、文件、匹配情况与差异规模，并支持按条件筛选。</p>
          </div>
          <div class="topbar-tools">
            <div class="badge warn">记录数 <span id="log-count">0</span></div>
          </div>
        </section>

        <section class="panel pad">
          <div class="toolbar">
            <div class="field">
              <label for="log-search">搜索</label>
              <input id="log-search" placeholder="任务编号或文件名" />
            </div>
            <div class="field">
              <label for="log-status">状态</label>
              <select id="log-status">
                <option value="">全部</option>
                <option value="success">成功</option>
                <option value="warning">存在差异</option>
                <option value="error">错误</option>
              </select>
            </div>
            <div class="field">
              <label for="log-from">起始日期</label>
              <input id="log-from" type="date" />
            </div>
            <div class="field">
              <label for="log-to">结束日期</label>
              <input id="log-to" type="date" />
            </div>
            <div class="field" style="align-self: end">
              <button class="secondary-button" id="log-reset" type="button">重置筛选</button>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>任务编号</th>
                  <th>时间</th>
                  <th>源账本 A</th>
                  <th>目标账本 B</th>
                  <th>匹配</th>
                  <th>差异</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="log-table-body"></tbody>
            </table>
          </div>
        </section>

        <div class="modal" id="task-detail-modal" hidden>
          <div class="modal-card">
            <div class="modal-header">
              <div>
                <p class="page-eyebrow" style="margin-bottom: 6px;">任务明细</p>
                <h3 class="panel-title" id="detail-task-id">-</h3>
                <p class="panel-subtitle" id="detail-files">-</p>
              </div>
              <button class="ghost-button" id="detail-close" type="button" onclick="this.closest('.modal').style.display='none'; this.closest('.modal').hidden=true; document.body.classList.remove('modal-open');">关闭</button>
            </div>
            <div class="metric-row" style="margin-top: 0;">
              <div class="metric-pill">
                <span class="note">创建时间</span>
                <strong id="detail-created-at">-</strong>
              </div>
              <div class="metric-pill">
                <span class="note">准确率</span>
                <strong id="detail-accuracy">-</strong>
              </div>
              <div class="metric-pill" style="min-width: 320px;">
                <span class="note">摘要</span>
                <strong id="detail-summary-inline">-</strong>
              </div>
            </div>
            <div class="toolbar" style="margin-top: 18px;">
              <button class="secondary-button active-chip" data-detail-filter="all" type="button">全部</button>
              <button class="secondary-button" data-detail-filter="matched" type="button">已匹配</button>
              <button class="secondary-button" data-detail-filter="bank_only" type="button">仅银行侧</button>
              <button class="secondary-button" data-detail-filter="ledger_only" type="button">仅台账侧</button>
            </div>
            <div class="toolbar">
              <button class="ghost-button" id="detail-export-summary" type="button">导出 summary.json</button>
              <button class="ghost-button" id="detail-export-matched" type="button">导出 matched.csv</button>
              <button class="ghost-button" id="detail-export-bank" type="button">导出 unmatched_bank.csv</button>
              <button class="ghost-button" id="detail-export-ledger" type="button">导出 unmatched_ledger.csv</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>类型</th>
                    <th>银行行号</th>
                    <th>台账行号</th>
                    <th>银行金额</th>
                    <th>台账金额</th>
                    <th>差额</th>
                    <th>日期</th>
                    <th>交易号</th>
                  </tr>
                </thead>
                <tbody id="detail-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
