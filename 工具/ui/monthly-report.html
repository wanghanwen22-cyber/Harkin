<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Precision Architect - 月度汇总</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge">账</div>
          <div class="brand-copy">
            <h1>企业对账系统</h1>
            <p>月度汇总</p>
          </div>
        </div>
        <nav class="nav-group">
          <a class="nav-link" href="./dashboard.html">仪表盘</a>
          <a class="nav-link" href="./audit-log.html">审核日志</a>
          <a class="nav-link active" href="./monthly-report.html">月度汇总</a>
          <a class="nav-link" href="./settings.html">系统设置</a>
        </nav>
      </aside>

      <main class="main">
        <section class="topbar">
          <div class="page-header">
            <p class="page-eyebrow">月度分析</p>
            <h2>月度绩效</h2>
            <p>按月份汇总任务处理金额、匹配率与差异数量，形成当月对账概览。</p>
          </div>
          <div class="topbar-tools">
            <input class="search" id="report-month" type="month" />
            <button class="secondary-button" id="report-export" type="button">导出 JSON</button>
          </div>
        </section>

        <section class="grid three">
          <div class="stat-card">
            <span class="stat-label">总额</span>
            <strong class="stat-value" id="report-total-amount">-</strong>
            <span class="stat-meta">当前月份累计处理金额</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">成功率</span>
            <strong class="stat-value" id="report-success-rate">-</strong>
            <span class="stat-meta">匹配记录 / 应匹配记录</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">差异</span>
            <strong class="stat-value" id="report-discrepancies">-</strong>
            <span class="stat-meta">当前月份累计异常数量</span>
          </div>
        </section>

        <section class="report-hero" style="margin-top: 20px">
          <div class="panel pad">
            <h3 class="panel-title">成交趋势</h3>
            <p class="panel-subtitle">按周聚合任务金额，便于观察当月处理节奏。</p>
            <div class="chart" id="report-chart"></div>
          </div>
          <div class="panel score-card">
            <div class="score-ring">
              <strong id="report-health-score">0.0</strong>
            </div>
            <h3 class="panel-title" style="color: #fff; margin-bottom: 10px">数据健康评分</h3>
            <p class="panel-subtitle" style="color: rgba(255,255,255,0.82)">评分依据当月匹配率和差异数量计算，仅统计当前浏览器中的任务数据。</p>
          </div>
        </section>

        <section class="panel pad" style="margin-top: 20px">
          <h3 class="panel-title">月度明细</h3>
          <p class="panel-subtitle">每条任务均可回溯到本地日志页进行明细查看。</p>
          <div class="table-wrap" style="margin-top: 16px">
            <table>
              <thead>
                <tr>
                  <th>源账本 A</th>
                  <th>目标账本 B</th>
                  <th>时间</th>
                  <th>金额</th>
                  <th>准确率</th>
                  <th>差异数</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="report-table-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
